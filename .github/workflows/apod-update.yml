name: NASA APOD Auto Update

on:
  schedule:
    # 美国东部标准时间（EST，UTC-5）01:30 = UTC 06:30
    - cron: '30 6 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/auto-update

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Write API Key
        run: echo "${{ secrets.NASA_API_KEY }}" > api-key.txt

      - name: Run pipeline
        run: uv run python main.py --no-tui

      - name: Rebuild Search Index
        working-directory: .
        run: python rebuild_index.py

      - name: Remove API Key
        if: always()
        run: rm -f api-key.txt

      - name: Commit & push changes
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/auto-update/update.json public/database/
          git diff --cached --quiet || git commit -m "chore: auto update APOD data [$(date -u '+%Y-%m-%d')]"
          git push
